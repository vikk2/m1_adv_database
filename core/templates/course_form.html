<h2>Create Course</h2>

<form method="post">
  {% csrf_token %}

  <input name="title" placeholder="Course Title" />

  <h3>Select Students</h3>
  {% for s in students %}
  <input type="checkbox" name="students" value="{{ s.id }}" />
  {{ s.name }} <br />
  {% endfor %}

  <button type="submit">Create</button>
</form>
